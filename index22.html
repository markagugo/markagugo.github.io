<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mark Agugo</title>
    <meta name="description" content="Mark Agugo Portfolio" />

    <style>
       .outer {
  display: table;
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;
  background-color: black;
}

.middle {
  display: table-cell;
  vertical-align: middle;
  background-color: black;
}

.inner {
  margin-left: auto;
  margin-right: auto;
  width: 400px;
  background-color: black;
  /* Whatever width you want */
}
    </style>
  </head>
  <body>

 <div class="outer">
  <div class="middle">
    <div class="inner">
      <p style="color: red; text-align: center; font-size: 40px; font-family: Georgia, 'Times New Roman', Times, serif;">
        SEE YOU AT THE OTHER SIDE :)</p>
    </div>
  </div>
</div>


  </body>
</html>
